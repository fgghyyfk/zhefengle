<!DOCTYPE HTML>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="lib/css/base.css" />
    <title>折疯了</title>
</head>
<body>
    <div id="warp">
        <header class="detailHeader">
            <h1><a href="" class="return"></a><a href="" class="returnIndex">主页</a>宝贝详情</h1>
        </header>
        
		<section class="mainctt detail on" id="detailMain">
        	<div class="detailInnerBox" id="detailInnerBox"></div>
		</section>
        <div class="dMenu">
            <a href="javascript:;" class="sicon comment" id="comment">评论</a>
            <a href="javascript:;" class="sicon love">喜欢</a>
            <a href="javascript:;" class="sicon share">分享</a>
            <a href="javascript:;" class="sicon buy">购买</a>
        </div>
        <div class="idialog commentBox" id="commentBox">
        	<div class="idialogInner">
                <input type="text" class="commentText" placeholder="发表您的评论~~" />
                <a href="javascript:;" class="commentBtn" id="commentBtn">发表</a>
            </div>
        </div>
    </div>
    <script id="detailTpl" type="text/html">
                <div class="detailInfoBox">
                    <div class="imgbox">
                        <img src="<%=imgurl%>" />
                    </div>
                    <div class="title"><%=title%><a href="" class="like"><%=like%>喜欢</a></div>
                    <div class="info">
                        <a href="" class="go">去优店</a>
                        <div class="price"><span>￥</span><%=price%></div>
                    </div>
                </div>
                <div class="detailComment">
                    <ul>
						<%for(i = 0; i < comment.length; i++) {%>
							<li>
								<div class="imgbox"><img src="<%=comment[i].headUrl%>" /></div>
								<div class="info">
									<div class="name"><a href=""><%=comment[i].name%></a>第一个分享 <div class="date"><%=comment[i].date%></div></div>
									<div class="commCtt">
										<%=comment[i].content%>
									</div>
								</div>
							</li>
						<%}%>
                    </ul>
                </div>
	</script>
	<script type="text/javascript" src="lib/js/zepto.js"></script>
	<script type="text/javascript" src="lib/js/gmu.js"></script>
	<script type="text/javascript" src="lib/js/template.min.js"></script>
	<script type="text/javascript" src="lib/js/base.js"></script>
	<script type="text/javascript">
	$(function () {
		function loadData(data){
			var data={
				title:'呢大衣这款真的超级爱超有型的哦还是很特别的蓝色系',
				imgurl:'lib/pic/ad2.jpg',
				like:'1123',
				price:'1233.00',
				comment:[
					{id:1,headUrl:'lib/pic/head.jpg',name:"just赵cc",date:'12月18日 14：16',link:'javascript:;',content:'呢大衣这款真的超级爱超有型的哦还是很特别的蓝色系'},
					{id:1,headUrl:'lib/pic/head.jpg',name:"just赵cc",date:'12月18日 14：16',link:'javascript:;',content:'呢大衣这款真的超级爱超有型的哦还是很特别的蓝色系'},
					{id:1,headUrl:'lib/pic/head.jpg',name:"just赵cc",date:'12月18日 14：16',link:'javascript:;',content:'呢大衣这款真的超级爱超有型的哦还是很特别的蓝色系'}
				]
			}
			var html = template.render("detailTpl", data);
			var $list = $("#detailInnerBox");
			$list.prepend(html);
			setTimeout(function(){
				$("#detailMain").css("height", window.innerHeight - $('header').height() - $('.dMenu').height())
				new iScroll('detailMain');
			},1000)
		}
		loadData();
		var tapevent = $.support.touch ? 'tap' : 'click';
		$("#comment").on(tapevent,function(){
			$("#commentBox").show();
		});
		$(".commentBox").on(tapevent,function(){
			$("#commentBox").hide();
		});
		$(".commentInner").on(tapevent,function(){
			return false;
		});
		$("#commentBtn").on(tapevent,function(){
			$("#commentBox").hide();
		})
		
	});

	</script>
</body>
</html>
