<!DOCTYPE HTML>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="lib/css/base.css" />
    <title>折疯了</title>
</head>
<body>
    <div id="warp">
        <header class="detailHeader">
            <h1><a href="" class="message"></a><a href="" class="setting"></a>艾玛_design</h1>
        </header>
        
		<section class="mainctt myctt" id="myMain" style="overflow:auto;">
        	<div class="myBox" id="myBox">
            	<div class="myAvatar">
                	<img src="lib/pic/avatar.jpg">
                    <a href="javascript:;" class="photo"></a>
                </div>
                <div class="myInfo">
                    <a href="" class="has"><span>1</span><strong>关注</strong></a>
                    <a href=""><span>0</span><strong>粉丝</strong></a>
                    <a href=""><span>0</span><strong>订单</strong></a>
                    <a href=""><span>0</span><strong>优惠劵</strong></a>
                    <a href=""><span>0</span><strong>购物车</strong></a>
                </div>
                <div class="myListNav" id="myListNav">
                	<a href="#love" class="on"><span class="love"></span>我的喜欢</a>
                    <a href="#special"><span class="special"></span>我的专辑</a>
                </div>
                <div class="myListPanel" id="myListPanel">
                	
                </div>
            </div>
		</section>
        <footer>
            <ul class="footBar">
                <li><a href="index.html"><span class="index"></span><strong>首页</strong></a></li>
                <li><a href="type.html"><span class="classify"></span><strong>分类</strong></a></li>
                <li><a href="match.html"><span class="match"></span><strong>搭配</strong></a></li>
                <li><a href="my_index.html" class="on"><span class="home"></span><strong>我的</strong></a></li>
            </ul>
        </footer>
    </div>
    <script id="myIndexTpl" type="text/html">
		<%if(list.length<=0) {%>
			<div class="listnone">暂无内容</div>
		<%}else{%>
		<ul>
			<%for(i = 0; i < list.length; i++) {%>
				<li>
					<h3 class="type"><%=list[i].typeName%></h3>
					<div class="like"><%=list[i].like%>人喜欢</div>
					<div class="masterImg">
						<a href="my_index_list.html"><img src="<%=list[i].bigimgurl%>" /></a>
					</div>
					<dl>
						<%for(j = 0; j < list[i].smallImg.length; j++) {%>
							<dd><a href="my_index_list.html"><img src="<%=list[i].smallImg[j].imgUrl%>"></a></dd>
						<%}%>
					</dl>
				</li>
			<%}%>
		</ul>
		<%}%>
		
		
	</script>
	<script type="text/javascript" src="lib/js/zepto.js"></script>
	<script type="text/javascript" src="lib/js/gmu.js"></script>
	<script type="text/javascript" src="lib/js/template.min.js"></script>
	<script type="text/javascript" src="lib/js/base.js"></script>
	<script type="text/javascript">
	$(function () {
		
		function loadData(pageName){
			$("#myListPanel").empty();
			var data={list:[
				{id:1,bigimgurl:'lib/pic/ad2.jpg',typeName:'服装',smallImg:[{link:'',imgUrl:'lib/pic/ad2.jpg'},{link:'',imgUrl:'lib/pic/ad2.jpg'},{link:'',imgUrl:'lib/pic/ad2.jpg'}],title:"",like:1347,link:'my_index_list.html'},
				{id:2,bigimgurl:'lib/pic/ad2.jpg',typeName:'服装',smallImg:[{link:'',imgUrl:'lib/pic/ad2.jpg'},{link:'',imgUrl:'lib/pic/ad2.jpg'},{link:'',imgUrl:'lib/pic/ad2.jpg'}],title:"",like:1347,link:'my_index_list.html'},
				{id:3,bigimgurl:'lib/pic/ad2.jpg',typeName:'服装',smallImg:[{link:'',imgUrl:'lib/pic/ad2.jpg'},{link:'',imgUrl:'lib/pic/ad2.jpg'},{link:'',imgUrl:'lib/pic/ad2.jpg'}],title:"",like:1347,link:'my_index_list.html'},
				{id:4,bigimgurl:'lib/pic/ad2.jpg',typeName:'服装',smallImg:[{link:'',imgUrl:'lib/pic/ad2.jpg'},{link:'',imgUrl:'lib/pic/ad2.jpg'},{link:'',imgUrl:'lib/pic/ad2.jpg'}],title:"",like:1347,link:'my_index_list.html'}
			]}
			var html = template.render("myIndexTpl", data);
			var $list = $("#myListPanel");
			$list.prepend(html);
		}
		
		function loadPage(pageName){
			window.scrollTo(0, 0);
			
		}
		var updatePage = function(){
			var pageName = location.hash.replace('#', '');
			if(pageName){
				loadData(pageName);
			}else{
				loadData('love');
			}
		}
	
		window.onhashchange = function(e){
			updatePage();
		}
	
		updatePage();
		$("#myMain").css("height", window.innerHeight - $('header').height() - $('footer').height()+20);
		$(window).resize(function(){
			$("#myMain").css("height", window.innerHeight - $('header').height() - $('footer').height()+20);
		})
		function handerClick(hander){
			var $handerLink=$(hander).find("a");
			var tapevent = $.support.touch ? 'tap' : 'click';
			$handerLink.on(tapevent,function(e){
				$handerLink.removeClass("on");
				$(this).addClass("on");
			});
		}
		handerClick(".myListNav");
	});

	</script>
</body>
</html>
