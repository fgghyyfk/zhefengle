<!DOCTYPE HTML>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="lib/css/base.css" />
    <title>折疯了</title>
</head>
<body>
    <div id="warp">
        <header class="detailHeader">
            <h1><a href="" class="return"></a><a href="" class="returnIndex">主页</a>宝贝详情</h1>
        </header>
        
		<section class="mainctt detail on" id="detailMain">
        	<div class="detailInnerBox" id="detailInnerBox"></div>
		</section>
        <div class="dMenu">
            <a href="javascript:;" class="sicon comment" id="comment">评论</a>
            <a href="javascript:;" class="sicon love">喜欢</a>
            <a href="javascript:;" class="sicon share" id="share">分享</a>
            <a href="javascript:;" class="sicon buy">购买</a>
        </div>
        <div class="idialog" id="shareBox">
        	<div class="idialogInner">
                <div class="shareBox">
                    <h3 class="tit"><span>分享到</span></h3>
                    <div class="shareList">
                        <a href="" class="sina"></a>
                        <a href="" class="weixin"></a>
                        <a href="" class="pengyou"></a>
                        <a href="" class="qzone"></a>
                        <a href="" class="qq"></a>
                        <a href="" class="qqweibo"></a>
                        <a href="" class="local"></a>
                    </div>
                    <div class="shareBtm">
                    	<a href="" class="canelShare" id="shareBtn">取消</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script id="detailTpl" type="text/html">
		<div class="detailInfoBox">
			<div class="imgbox">
				<img src="<%=imgurl%>" width="320" height="480" />
			</div>
			<div class="matchDtlInfo">
				<h3 class="matchTitle">
					<div class="matchTitIn">
						<span>共<%=macthInfo.length%>件搭配</span>
					</div>
				</h3>
				<ul>
					<%for(i = 0; i < macthInfo.length; i++) {%>
						<li>
							<a href="">
								<div class="macthImg">
									<img src="<%=macthInfo[i].imgurl%>" />
								</div>
								<div class="macthInfo">
									<div class="infoTitle">
										<%=macthInfo[i].title%>
									</div>
									<div class="infoPrice"><span>￥</span><%=macthInfo[i].price%></div>
								</div>
							</a>
						</li>
					<%}%>
					
				</ul>
			</div>
		</div>
		<div class="detailComment">
			<ul>
				<%for(i = 0; i < comment.length; i++) {%>
					<li>
						<div class="imgbox"><img src="<%=comment[i].headUrl%>" /></div>
						<div class="info">
							<div class="name"><a href=""><%=comment[i].name%></a>第一个分享 <div class="date"><%=comment[i].date%></div></div>
							<div class="commCtt">
								<%=comment[i].content%>
							</div>
						</div>
					</li>
				<%}%>
			</ul>
		</div>
	</script>
	<script type="text/javascript" src="lib/js/zepto.js"></script>
	<script type="text/javascript" src="lib/js/gmu.js"></script>
	<script type="text/javascript" src="lib/js/template.min.js"></script>
	<script type="text/javascript" src="lib/js/base.js"></script>
	<script type="text/javascript">
	$(function () {
		function loadData(data){
			var data={
				title:'呢大衣这款真的超级爱超有型的哦还是很特别的蓝色系',
				imgurl:'lib/pic/ad2.jpg',
				like:'1123',
				price:'1233.00',
				macthInfo:[
					{id:11,imgurl:'lib/pic/dp.jpg',price:188,title:"2013冬季女韩版全棉磨毛保暖超有范儿滴混纺羊毛大衣..."},
					{id:11,imgurl:'lib/pic/dp.jpg',price:188,title:"2013冬季女韩版全棉磨毛保暖超有范儿滴混纺羊毛大衣..."},
					{id:11,imgurl:'lib/pic/dp.jpg',price:188,title:"2013冬季女韩版全棉磨毛保暖超有范儿滴混纺羊毛大衣..."}
				],
				comment:[
					{id:1,headUrl:'lib/pic/head.jpg',name:"just赵cc",date:'12月18日 14：16',link:'javascript:;',content:'呢大衣这款真的超级爱超有型的哦还是很特别的蓝色系'},
					{id:1,headUrl:'lib/pic/head.jpg',name:"just赵cc",date:'12月18日 14：16',link:'javascript:;',content:'呢大衣这款真的超级爱超有型的哦还是很特别的蓝色系'},
					{id:1,headUrl:'lib/pic/head.jpg',name:"just赵cc",date:'12月18日 14：16',link:'javascript:;',content:'呢大衣这款真的超级爱超有型的哦还是很特别的蓝色系'}
				]
			}
			var html = template.render("detailTpl", data);
			var $list = $("#detailInnerBox");
			$list.prepend(html);
			$("#detailMain").css("height", window.innerHeight - $('header').height() - $('.dMenu').height())
			new iScroll('detailMain');
		}
		loadData();
		var tapevent = $.support.touch ? 'tap' : 'click';
		$("#share").on(tapevent,function(){
			$("#shareBox").show();
		});
		$(".idialog").on(tapevent,function(){
			$("#shareBox").hide();
		});
		$(".idialogInner").on(tapevent,function(){
			return false;
		});
		$("#shareBtn").on(tapevent,function(){
			$("#shareBox").hide();
		})
		
	});

	</script>
</body>
</html>
