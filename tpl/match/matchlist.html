<div class="indexPanel" id="typelistBox">
    <div class="ui-refresh">
        <ul id="typelist" class="hotList">
            
        </ul>
        <div class="ui-refresh-down"></div>
    </div>
</div>
<script id="typelistTpl" type="text/html">
    <%for(i = 0; i < list.length; i++) {%>
		<li id="<%=list[i].id%>">
			<div class="imgbox">
				<a href="<%=list[i].link%>"><img src="<%=list[i].img.url%>" width="<%=list[i].img.w%>" height="<%=list[i].img.h%>" /></a>
			</div>
			<div class="userInfo">
				<div class="header">
					<a href=""><img src="lib/pic/head.jpg" /></a>
				</div>
				<div class="userName">
					<a href=""><%=list[i].name%></a>
				</div>
			</div>
			
			<div class="info">
				<a href="javascript:;" class="like"><%=list[i].like%></a>
				<a href="javascript:;" class="matchNum"><%=list[i].matchNum%>件搭配</a>
			</div>
			<div class="typeComment">
				<dl>
					<%for(j = 0; j < list[i].comment.length; j++) {%>
						<dd>
							<a href=""><img src="<%=list[i].comment[j].imgurl%>" />
								<div class="smallText"><%=list[i].comment[j].content%></div>
							</a>
						</dd>
						
					<%}%>
				</dl>
			</div>
		</li>
    <%}%>
</script>
