<meta charset="UTF-8">
<div id="grouponBox" class="indexPanel">
    <div class="ui-refresh">
        <div class="grouponList">
            <ul id="grouponList">
                
            </ul>
            <div class="ui-refresh-down"></div>
        </div>
    </div>
</div>
<script id="grouponTpl" type="text/html">
    <%for(i = 0; i < list.length; i++) {%>
		<li id="<%=list[i].id%>">
			<div class="imgbox">
				<a href="<%=list[i].link%>"><img src="<%=list[i].imgurl%>" /></a>
				<a href="javascript:;" class="discount">3.7折</a>
			</div>
			<div class="title">
				<a href="<%=list[i].link%>"><%=list[i].title%></a>
				<div class="price">
					<span class="nowPrice">￥<strong><%=list[i].nowPrice%></strong></span>
					<span class="oldPrice">￥<%=list[i].oldPrice%></span>
				</div>
			</div>
			<div class="info">
				<div class="date"><%=list[i].date%></div>
				<div class="peopleNum"><%=list[i].peopleNum%>人</div>
			</div>
		</li>
    <%}%>
</script>
<script>
$(function () {

	function loadData(){
		var data={list:[
			{id:1,imgurl:'lib/pic/ad2.jpg',title:"做工精细，面料最合适这个冬天啦做工精细",link:'javascript:;',nowPrice:'150.00',oldPrice:'380.00',date:'20天24小时8分',discount:'3.7折',peopleNum:1347},
			{id:1,imgurl:'lib/pic/ad2.jpg',title:"做工精细，面料最合适这个冬天啦做工精细",link:'javascript:;',nowPrice:'150.00',oldPrice:'380.00',date:'20天24小时8分',discount:'5折',peopleNum:1347},
			{id:1,imgurl:'lib/pic/ad2.jpg',title:"己备一件，最合适这个冬天啦做工精细",link:'javascript:;',nowPrice:'150.00',oldPrice:'380.00',date:'20天24小时8分',discount:'5折',peopleNum:1347},
			{id:1,imgurl:'lib/pic/ad2.jpg',title:"做不给自己备一件，最合适这个冬天啦做工精细",link:'javascript:;',nowPrice:'150.00',oldPrice:'380.00',date:'20天24小时8分',discount:'3.7折',peopleNum:1347}
		]}
		var html = template.render("grouponTpl", data);
		var $list = $("#grouponList");
		$list.prepend(html);
		$(".headBar a").removeClass("on");
		$("#grouponLink").addClass("on");
		var options = {
		  autoResize: true,
		  container: $('#grouponList'),
		  offset: 5, 
		  itemWidth: 150 
		};
		$("#grouponList li").wookmark(options);
	}
	loadData();
    $(".ui-refresh").css("height", window.innerHeight - $('header').height() - $('footer').height()+106 ).refresh({
        load: function (dir, type) {
            var me = this;
            $.ajax({
				url:'',
				cache:false,
				success:function(data){
					loadData(data);
					me.afterDataLoading(dir);    //数据加载完成后改变状态
				},
				error:function(){
					alert("加载失败")	;
				}	
			})
        }
    });
});

</script>
