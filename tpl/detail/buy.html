<div class="buyBox" id="buyBox">
    <a href="javascript:;" class="dlgClose"></a>
</div>
<script id="buyTpl" type="text/html">
    
	<div class="goods">
        <div class="goodsAttrbox goodsSize">
            <div class="gsName">尺码：</div>
            <div class="gsCont">
				<%for(i = 0; i < size.length; i++) {%>
					<label class="specValue<%=size[i].value%>">
						<span><%=size[i].key%></span><input type="radio" name="radioSize" class="radioSize" value="<%=size[i].value%>">
					</label>
				<%}%>
            </div>
        </div> 
        
        <div class="goodsAttrbox goodsColor">
            <div class="gsName">颜色：</div>
            <div class="gsCont">
				<%for(i = 0; i < color.length; i++) {%>
					<label class="color<%=color[i].value%>">
						<span><%=color[i].key%></span><input type="radio" name="radioColor" class="radioCcolor" value="<%=color[i].value%>">
					</label>
				<%}%>
            </div>
        </div> 
         
        <div class="goodsAttrbox goodsNum">
            <div class="gsName">数量：</div>
            <div class="gsCont">
                <label class="goodsAdd" id="goodsAdd"></label>
                <input type="text" class="goodsNumVal" value="1" id="goodsNumVal" />
                <label class="goodsReduce" id="goodsReduce"></label>
            </div>
        </div>
    </div>
	<div class="payInfo">
		<input type="hidden" id="onePrice" value="<%=price%>" />
		<div class="paymoney">总金额：<span>￥<strong id="payMoney"><%=price%></strong></span></div>
		<a href="" class="payBtn">去结算</a>
	</div>
</script>
<script type="text/javascript">
$(function () {
	function loadData(data){
		var data={
				size:[{key:'S',value:1},{key:'M',value:2},{key:'L',value:3},{key:'XL',value:4}],
				color:[{key:"黄色",value:"1"},{key:"红色",value:"2"},{key:"蓝色",value:"3"}],
				price:185
			}
		var html = template.render("buyTpl", data);
		var $list = $("#buyBox");
		$list.prepend(html);
		var tapevent = $.support.touch ? 'tap' : 'click';
		$(".goodsSize label").on(tapevent,function(){
			$(".goodsSize label").removeClass("labelclk");
			$(this).addClass("labelclk");
		})
		$(".goodsColor label").on(tapevent,function(){
			$(".goodsColor label").removeClass("labelclk");
			$(this).addClass("labelclk");
		})
		$("#goodsAdd").click(function(){
			var num = parseInt($("#goodsNumVal").val())-1;
			if(num<=0)
			{
				num = 1;
			}
			$("#goodsNumVal").val(num);
			$("#payMoney").text(parseInt($("#onePrice").val())*num);
		})
		$("#goodsReduce").click(function(){
			var num=parseInt($("#goodsNumVal").val())+1;
			$("#goodsNumVal").val(num);
			$("#payMoney").text(parseInt($("#onePrice").val())*num);
		})
	}
	loadData();
	var tapevent = $.support.touch ? 'tap' : 'click';
	$(".dlgClose").on(tapevent,function(){
		$("#buyDialog").hide();
	})
});

</script>
