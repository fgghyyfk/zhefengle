<div class="stBox stProduct">
    <table class="defaultTable" id="stProduct"></table>
</div>
<script id="stProductTpl" type="text/html">
    <%for(i = 0; i < list.length; i++) {%>
		<tr><td class="th"><%=list[i].key%></td><td><%=list[i].value%></td></tr>
    <%}%>
</script>
<script type="text/javascript">
$(function () {
	function loadData(data){
		var data={list:[
			{key:"领型",value:'连帽/冒领'},
			{key:"材质",value:'棉'},
			{key:"填充物",value:'棉71%-80%'},
			{key:"袖长",value:'常规袖'},
			{key:"衣长",value:'中长款（66-80cm）'},
			{key:"版型",value:'宽松'},
			{key:"衣门禁",value:'单排扣'}
		]}
		var html = template.render("stProductTpl", data);
		var $list = $("#stProduct");
		$list.prepend(html);
	}
	loadData();
	$(".smallTextNav a").removeClass("on");
	$("#stProductMenu").addClass("on");
});

</script>
