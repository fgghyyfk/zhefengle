<div class="stBox stEvaluate">
    <div class="detailComment" id="detailComment">
        
    </div>
</div>
<script id="commentTpl" type="text/html">
	<div class="commentInfo">
		<div class="sum">共有<%=sum%>条评论</div>
		<dl class="commentInfoCtt">
			<dd class="">款式新颖：4.9<div class="plan"><div class="planCtt" style="width:98%;"></div></div></dd>
			<dd class="">价格合理：4.9<div class="plan"><div class="planCtt" style="width:58%;"></div></div></dd>
			<dd class="">商品质量：4.9<div class="plan"><div class="planCtt" style="width:48%;"></div></div></dd>
		</dl>
	</div>
	<ul>
		<%for(i = 0; i < comment.length; i++) {%>
			<li>
				<div class="imgbox"><img src="<%=comment[i].headUrl%>" /></div>
				<div class="info">
					<div class="name"><a href=""><%=comment[i].name%></a>第一个分享 <div class="date"><%=comment[i].date%></div></div>
					<div class="commCtt">
						<%=comment[i].content%>
					</div>
					<div class="colorType">颜色：蓝色 尺码：均码</div>
				</div>
			</li>
		<%}%>
	</ul>
</script>
